<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Digital Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --box-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --error-color: #ef4444;
            --success-color: #10b981;
            --font-family: 'Inter', sans-serif;
            --border-radius: 12px;
            --box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .checkout-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 960px;
            background-color: var(--box-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        @media(min-width: 768px) {
            .checkout-container { flex-direction: row; }
        }

        .order-summary {
            padding: 40px;
            flex: 1;
            background: linear-gradient(135deg, rgba(30,41,59,1) 0%, rgba(15,23,42,1) 100%);
            border-bottom: 1px solid var(--border-color);
        }
        @media(min-width: 768px) {
            .order-summary {
                border-bottom: none;
                border-right: 1px solid var(--border-color);
            }
        }

        .order-summary h2 { margin-top: 0; font-size: 24px; font-weight: 600; margin-bottom: 24px; }

        .line-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .item-details { display: flex; flex-direction: column; }
        .item-name { font-weight: 500; }
        .item-qty { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
        .item-price { font-weight: 500; }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            font-size: 20px;
            font-weight: 600;
        }

        .payment-section {
            padding: 40px;
            flex: 1.2;
            display: flex;
            flex-direction: column;
        }

        .payment-section h2 { margin-top: 0; font-size: 20px; font-weight: 500; margin-bottom: 24px; }

        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); font-weight: 500; }

        .input-base {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: var(--font-family);
        }
        .input-base:focus { outline: none; border-color: var(--accent-color); }
        .input-base:read-only { opacity: 0.7; cursor: not-allowed; }

        #error-message { color: var(--error-color); font-size: 14px; margin-top: 12px; min-height: 20px; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--border-color); cursor: not-allowed; color: var(--text-muted); }

        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .page-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="page-loader" class="page-loader">
        <div class="spinner" style="display: block; width: 40px; height: 40px;"></div>
        <p style="margin-top: 20px; color: var(--text-muted);">Loading secure checkout...</p>
    </div>

    <div id="checkout-container" class="checkout-container hidden">
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="line-items-container"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="total-amount">$0.00</span>
            </div>
        </div>

        <div class="payment-section">
            <h2>Digital Wallet Authorization</h2>
            <form id="payment-form">
                <div class="form-row">
                    <label for="email">Wallet Email</label>
                    <input type="email" id="email" class="input-base" readonly>
                </div>
                <div class="form-row">
                    <label for="password">Wallet Password</label>
                    <input type="password" id="password" class="input-base" placeholder="Enter your password to authorize" required>
                </div>
                <div id="error-message"></div>
                <button id="submit-button" type="submit">
                    <span id="button-text">Authorize Payment</span>
                    <div class="spinner" id="button-spinner"></div>
                </button>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="#" id="cancel-link" style="color: var(--text-muted); font-size: 14px;">Cancel and return to merchant</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const sessionId = pathParts[pathParts.length - 1];
        let sessionData = {};

        const formatMoney = (amount, currency) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD' }).format(amount / 100);
        };

        async function loadSession() {
            try {
                const res = await fetch(`/api/v1/checkout/sessions/${sessionId}`);
                if (!res.ok) throw new Error('Failed to load checkout session');
                
                sessionData = await res.json();
                
                if(sessionData.status !== 'open') {
                    document.body.innerHTML = `
                        <div style="text-align:center; margin-top:100px;">
                            <h2>Checkout Session Closed</h2>
                            <p style="color:var(--text-muted)">This session is currently <b>${sessionData.status}</b>.</p>
                            <button onclick="window.location.href='${sessionData.cancel_url || '/'}'" style="padding:10px 20px; margin-top:20px; cursor:pointer;">Go Back</button>
                        </div>`;
                    return;
                }

                // Render Summary
                const container = document.getElementById('line-items-container');
                if(sessionData.line_items && sessionData.line_items.length > 0) {
                    container.innerHTML = sessionData.line_items.map(item => `
                        <div class="line-item">
                            <div class="item-details">
                                <span class="item-name">${item.name}</span>
                                <span class="item-qty">Qty: ${item.quantity}</span>
                            </div>
                            <span class="item-price">${formatMoney(item.price * item.quantity, sessionData.currency)}</span>
                        </div>
                    `).join('');
                }
                
                document.getElementById('total-amount').textContent = formatMoney(sessionData.amount_total, sessionData.currency);
                document.getElementById('email').value = sessionData.customer_email || '';
                
                document.getElementById('cancel-link').href = sessionData.cancel_url || '/';

                document.getElementById('page-loader').classList.add('hidden');
                document.getElementById('checkout-container').classList.remove('hidden');

            } catch (err) {
                document.getElementById('page-loader').innerHTML = `<p style="color: var(--error-color);">${err.message}</p>`;
            }
        }

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-button');
            const btnText = document.getElementById('button-text');
            const spinner = document.getElementById('button-spinner');
            const errorMsg = document.getElementById('error-message');
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorMsg.textContent = '';

            try {
                const res = await fetch(`/api/v1/checkout/sessions/${sessionId}/authorize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.detail || "Authorization failed.");
                }

                if (data.status === 'succeeded') {
                    // Redirect to success_url
                    const successUrl = new URL(data.success_url, window.location.origin);
                    successUrl.searchParams.append('session_id', sessionId);
                    window.location.href = successUrl.toString();
                }

            } catch(err) {
                errorMsg.textContent = err.message;
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });

        loadSession();
    </script>
</body>
</html>
