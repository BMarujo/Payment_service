<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <!-- Use a modern Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Stripe JS SDK -->
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            --bg-color: #0f172a;      /* deep slate/blue for a premium dark mode */
            --box-bg: #1e293b;        /* slightly lighter slate for boxes */
            --text-main: #f8fafc;     
            --text-muted: #94a3b8;    
            --accent-color: #3b82f6;  /* vibrant blue for buttons */
            --accent-hover: #2563eb;
            --border-color: #334155;
            --error-color: #ef4444;
            --success-color: #10b981;
            --font-family: 'Inter', sans-serif;
            --border-radius: 12px;
            --box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .checkout-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 960px;
            background-color: var(--box-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        @media(min-width: 768px) {
            .checkout-container {
                flex-direction: row;
            }
        }

        /* ----- Order Summary (Left Side) ----- */
        .order-summary {
            padding: 40px;
            flex: 1;
            background: linear-gradient(135deg, rgba(30,41,59,1) 0%, rgba(15,23,42,1) 100%);
            border-bottom: 1px solid var(--border-color);
        }
        @media(min-width: 768px) {
            .order-summary {
                border-bottom: none;
                border-right: 1px solid var(--border-color);
            }
        }

        .order-summary h2 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .line-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .item-details {
            display: flex;
            flex-direction: column;
        }
        .item-name {
            font-weight: 500;
        }
        .item-qty {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .item-price {
            font-weight: 500;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            font-size: 20px;
            font-weight: 600;
        }

        /* ----- Payment Form (Right Side) ----- */
        .payment-section {
            padding: 40px;
            flex: 1.2;
            display: flex;
            flex-direction: column;
        }

        .payment-section h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-row label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-base {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: var(--font-family);
        }
        .input-base:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Stripe Element container */
        #card-element {
            padding: 14px;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
        }

        .StripeElement--focus {
            border-color: var(--accent-color);
        }

        #error-message {
            color: var(--error-color);
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:hover {
            background-color: var(--accent-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            color: var(--text-muted);
            transform: none;
        }

        /* Loading spinner CSS */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Centered loader for initial page load */
        .page-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .hidden {
            display: none !important;
        }

    </style>
</head>
<body>

    <!-- Initial Loading State -->
    <div id="page-loader" class="page-loader">
        <div class="spinner" style="display: block; width: 40px; height: 40px;"></div>
        <p style="margin-top: 20px; color: var(--text-muted);">Loading secure checkout...</p>
    </div>

    <!-- Main Checkout UI (hidden until loaded) -->
    <div id="checkout-container" class="checkout-container hidden">
        
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="line-items-container">
                <!-- Line items inserted here by JS -->
            </div>
            
            <div class="total-row">
                <span>Total</span>
                <span id="total-amount">$0.00</span>
            </div>
        </div>

        <div class="payment-section">
            <h2>Payment Details</h2>
            <form id="payment-form">
                
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="input-base" placeholder="you@example.com" required>
                </div>

                <div class="form-row">
                    <label for="name">Name on Card</label>
                    <input type="text" id="name" class="input-base" placeholder="Jane Doe" required>
                </div>

                <div class="form-row">
                    <label for="card-element">Card Information</label>
                    <div id="card-element"><!-- Stripe injects iframe here --></div>
                </div>

                <div id="error-message"></div>

                <button id="submit-button" type="submit">
                    <span id="button-text">Pay Now</span>
                    <div class="spinner" id="button-spinner"></div>
                </button>
                <div style="text-align: center; margin-top: 20px; margin-bottom: -15px;">
                    <button class="cancel-button" id="cancel-button" type="button" style="background-color: transparent; color: var(--text-muted); padding: 5px; font-weight: normal; font-size: 14px; text-decoration: underline;">
                        Cancel and return to merchant
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. Initialization and State ---
        let stripe;
        let elements;
        let cardElement;
        let sessionData = {};

        // Extract session ID from URL (e.g., /checkout/1234-abcd)
        const pathParts = window.location.pathname.split('/');
        const sessionId = pathParts[pathParts.length - 1];

        // Format currency helper
        const formatMoney = (amount, currency) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: currency || 'USD',
            }).format(amount / 100);
        };

        // --- 2. Load Data and Setup UI ---
        async function loadSession() {
            try {
                // We don't send API key here because this page is public
                // but the endpoint needs to skip auth. We did that in main.py
                const res = await fetch(`/api/v1/checkout/sessions/${sessionId}`);
                if (!res.ok) throw new Error('Failed to load checkout session');
                
                sessionData = await res.json();
                
                if(sessionData.status !== 'open') {
                    document.body.innerHTML = `
                        <div style="text-align:center; margin-top:100px;">
                            <h2>Checkout Session Closed</h2>
                            <p style="color:var(--text-muted)">This session is currently <b>${sessionData.status}</b>.</p>
                            <button onclick="window.location.href='${sessionData.cancel_url || '/'}'" style="max-width: 200px; margin: 20px auto;">Go Back</button>
                        </div>
                    `;
                    return;
                }

                if(!sessionData.publishable_key || sessionData.publishable_key === 'pk_test_placeholder') {
                    throw new Error("Stripe Publishable Key is not configured correctly on the server. Please check the backend .env file.");
                }

                // Render UI
                renderOrderSummary(sessionData);
                
                // Initialize Stripe
                initStripe(sessionData.publishable_key);

                // Setup auto-fill and lock the fields (since the identity is verified via DB)
                if (sessionData.customer_email) {
                    const emailInput = document.getElementById('email');
                    emailInput.value = sessionData.customer_email;
                    emailInput.readOnly = true;
                    emailInput.style.opacity = '0.6';
                    emailInput.style.cursor = 'not-allowed';
                }
                if (sessionData.customer_name) {
                    const nameInput = document.getElementById('name');
                    nameInput.value = sessionData.customer_name;
                    nameInput.readOnly = true;
                    nameInput.style.opacity = '0.6';
                    nameInput.style.cursor = 'not-allowed';
                }

                // Setup clear/cancel url handler
                document.getElementById('cancel-button').onclick = () => {
                    if(sessionData.cancel_url) {
                        window.location.href = sessionData.cancel_url;
                    } else {
                        window.location.href = "/";
                    }
                }

            } catch (err) {
                console.error(err);
                document.getElementById('page-loader').innerHTML = `
                    <p style="color: var(--error-color); text-align: center;">Error loading checkout.<br>${err.message}</p>
                `;
            }
        }

        function renderOrderSummary(data) {
            const container = document.getElementById('line-items-container');
            container.innerHTML = '';
            
            if(data.line_items && data.line_items.length > 0) {
                data.line_items.forEach(item => {
                    container.innerHTML += `
                        <div class="line-item">
                            <div class="item-details">
                                <span class="item-name">${item.name}</span>
                                <span class="item-qty">Qty: ${item.quantity}</span>
                            </div>
                            <span class="item-price">${formatMoney(item.price * item.quantity, data.currency)}</span>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `<p style="color:var(--text-muted)">No items found.</p>`;
            }

            document.getElementById('total-amount').textContent = formatMoney(data.amount_total, data.currency);
            document.getElementById('button-text').textContent = `Pay ${formatMoney(data.amount_total, data.currency)}`;

            // Switch loading states
            document.getElementById('page-loader').classList.add('hidden');
            document.getElementById('checkout-container').classList.remove('hidden');
        }

        function initStripe(publishableKey) {
            stripe = Stripe(publishableKey);
            elements = stripe.elements();

            // Custom styling for elements to match our dark theme
            const style = {
                base: {
                    color: '#f8fafc',
                    fontFamily: '"Inter", sans-serif',
                    fontSmoothing: 'antialiased',
                    fontSize: '16px',
                    '::placeholder': { color: '#64748b' }
                },
                invalid: {
                    color: '#ef4444',
                    iconColor: '#ef4444'
                }
            };

            cardElement = elements.create('card', { style: style });
            cardElement.mount('#card-element');

            // Handle validation errors
            cardElement.on('change', function(event) {
                const displayError = document.getElementById('error-message');
                if (event.error) {
                    displayError.textContent = event.error.message;
                } else {
                    displayError.textContent = '';
                }
            });
        }

        // --- 3. Handle Form Submission ---
        const form = document.getElementById('payment-form');
        const submitBtn = document.getElementById('submit-button');
        const btnText = document.getElementById('button-text');
        const spinner = document.getElementById('button-spinner');
        const errorMsg = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setLoading(true);

            try {
                // 1. We must call our backend to get the client_secret for this session
                const payRes = await fetch(`/api/v1/checkout/sessions/${sessionId}/pay`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if(!payRes.ok) {
                    const errObj = await payRes.json();
                    throw new Error(errObj.error?.detail || "Failed to process payment data.");
                }
                
                const { client_secret } = await payRes.json();
                
                const cardholderName = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                
                if (!email || !cardholderName) {
                    throw new Error("Please ensure both your Email and Name on Card are filled out.");
                }

                // 2. Confirm the payment with Stripe Elements
                const { error, paymentIntent } = await stripe.confirmCardPayment(client_secret, {
                    payment_method: {
                        card: cardElement,
                        billing_details: {
                            name: cardholderName,
                            email: email
                        }
                    }
                });

                if (error) {
                    throw error; // Let the catch block show it
                }

                // 3. Payment succeeded!
                if (paymentIntent.status === 'succeeded' || paymentIntent.status === 'requires_capture') {
                    // Redirect to success_url
                    const successUrl = new URL(sessionData.success_url, window.location.origin);
                    successUrl.searchParams.append('session_id', sessionId);
                    window.location.href = successUrl.toString();
                }

            } catch(err) {
                errorMsg.textContent = err.message || "An unexpected error occurred.";
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
                errorMsg.textContent = '';
            } else {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        // --- Start execution ---
        loadSession();

    </script>
</body>
</html>
