<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APalPay — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0a0a;
            --surface-color: rgba(40, 15, 15, 0.75);
            --primary-color: #dc2626;
            --primary-hover: #b91c1c;
            --primary-glow: rgba(220, 38, 38, 0.25);
            --text-color: #fef2f2;
            --text-muted: #fca5a5;
            --border-color: rgba(220, 38, 38, 0.2);
            --success-color: #4ade80;
            --warning-color: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image:
                radial-gradient(ellipse at 10% 30%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(185, 28, 28, 0.06) 0%, transparent 50%);
            color: var(--text-color);
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            max-width: 960px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left img {
            width: 40px;
            height: auto;
            border-radius: 8px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        button.logout {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
        }

        button.logout:hover {
            border-color: var(--primary-color);
            color: var(--text-color);
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow:
                0 0 0 1px var(--border-color),
                0 10px 30px rgba(0, 0, 0, 0.4);
            max-width: 960px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th { color: var(--text-muted); font-weight: 500; font-size: 0.875rem; }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: rgba(220, 38, 38, 0.05); }

        .status {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status.succeeded { background-color: rgba(74, 222, 128, 0.15); color: var(--success-color); }
        .status.pending { background-color: rgba(251, 191, 36, 0.15); color: var(--warning-color); }

        .amount {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <img src="/static/logo.svg" alt="APalPay">
        <h1>APalPay</h1>
    </div>
    <button class="logout" onclick="logout()">Sign Out</button>
</div>

<div class="card">
    <div class="card-header">Transaction History</div>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="transaction-list">
            <tr><td colspan="4" style="text-align:center; color: var(--text-muted);">Loading transactions...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const token = localStorage.getItem('egs_access_token');

    if (!token) {
        window.location.href = '/wallet/login';
    }

    async function loadTransactions() {
        try {
            const resp = await fetch('/api/v1/customers/me/transactions', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (resp.status === 401) {
                logout();
                return;
            }

            const data = await resp.json();
            const tbody = document.getElementById('transaction-list');

            if (data.items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--text-muted);">No transactions yet.</td></tr>';
                return;
            }

            tbody.innerHTML = data.items.map(tx => {
                const date = new Date(tx.created_at).toLocaleDateString(undefined, {
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const amount = new Intl.NumberFormat('en-US', { style: 'currency', currency: tx.currency }).format(tx.amount / 100);

                return `
                    <tr>
                        <td style="color: var(--text-muted); font-size: 0.875rem;">${date}</td>
                        <td>${tx.description || 'Wallet Transfer'}</td>
                        <td class="amount">${amount}</td>
                        <td><span class="status ${tx.status}">${tx.status}</span></td>
                    </tr>
                `;
            }).join('');

        } catch (err) {
            console.error('Failed to load transactions:', err);
        }
    }

    function logout() {
        localStorage.removeItem('egs_access_token');
        window.location.href = '/wallet/login';
    }

    loadTransactions();
</script>

</body>
</html>
