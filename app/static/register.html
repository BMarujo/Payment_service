<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Digital Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; text-align: center; }
        p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.875rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary-color); }

        button {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }
        button:hover { background-color: var(--primary-hover); }

        .error { color: var(--error-color); font-size: 0.875rem; margin-top: 0.5rem; display: none; }
        .success { color: var(--success-color); font-size: 0.875rem; margin-top: 0.5rem; display: none; }

        .link-row {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .link-row a { color: var(--primary-color); text-decoration: none; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Create Account</h1>
    <p class="subtitle">Register to use the payment service.</p>

    <form id="register-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Jane Doe">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="jane@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters">
        </div>

        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>

        <button type="submit" id="submit-btn">Create Account</button>
    </form>

    <div class="link-row">
        Already have an account? <a href="/wallet/login">Sign in</a>
    </div>
</div>

<script>
    const EGS_TOKEN_KEY = 'egs_access_token';
    const AUTH_SERVICE_BASE = `${window.location.protocol}//${window.location.hostname}:8000`;

    // If already logged in, go to dashboard
    if (localStorage.getItem(EGS_TOKEN_KEY)) {
        window.location.href = '/static/dashboard.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        btn.textContent = 'Creating account...';
        btn.disabled = true;

        try {
            // Register directly in the EGS Auth Service.
            const registerResp = await fetch(`${AUTH_SERVICE_BASE}/api/v1/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: name, email, password })
            });

            const registerData = await registerResp.json();

            if (!registerResp.ok) {
                throw new Error(registerData.detail || 'Registration failed');
            }

            // Login right after successful registration to obtain an access token.
            const loginResp = await fetch(`${AUTH_SERVICE_BASE}/api/v1/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const loginData = await loginResp.json();

            if (!loginResp.ok || !loginData.access_token) {
                throw new Error(loginData.detail || 'Registration succeeded, but auto-login failed');
            }

            localStorage.setItem(EGS_TOKEN_KEY, loginData.access_token);

            successEl.textContent = 'Account created! Redirecting...';
            successEl.style.display = 'block';

            setTimeout(() => {
                const returnUrl = localStorage.getItem('checkout_return_url');
                if (returnUrl) {
                    localStorage.removeItem('checkout_return_url');
                    window.location.href = returnUrl;
                } else {
                    window.location.href = '/static/dashboard.html';
                }
            }, 1000);

        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
