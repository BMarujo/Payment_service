<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APalPay — Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0a0a;
            --surface-color: rgba(40, 15, 15, 0.75);
            --primary-color: #dc2626;
            --primary-hover: #b91c1c;
            --primary-glow: rgba(220, 38, 38, 0.25);
            --text-color: #fef2f2;
            --text-muted: #fca5a5;
            --border-color: rgba(220, 38, 38, 0.25);
            --input-bg: rgba(15, 5, 5, 0.6);
            --error-color: #fbbf24;
            --success-color: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(220, 38, 38, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(185, 28, 28, 0.08) 0%, transparent 50%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow:
                0 0 0 1px var(--border-color),
                0 20px 50px rgba(0, 0, 0, 0.6),
                0 0 80px var(--primary-glow);
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-area img {
            width: 80px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 0.75rem;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        h1 { font-size: 1.25rem; margin-bottom: 0.25rem; font-weight: 600; text-align: center; }
        p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.875rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary-color), #991b1b);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            margin-top: 1rem;
            font-family: 'Inter', sans-serif;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }
        button:active { transform: translateY(0); }

        .error { color: var(--error-color); font-size: 0.875rem; margin-top: 0.5rem; display: none; }
        .success { color: var(--success-color); font-size: 0.875rem; margin-top: 0.5rem; display: none; }

        .link-row {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .link-row a { color: var(--primary-color); text-decoration: none; font-weight: 500; }
        .link-row a:hover { text-decoration: underline; }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <img src="/static/logo.svg" alt="APalPay Logo">
        <div class="brand-name">APalPay</div>
    </div>

    <div class="divider"></div>

    <h1>Create Account</h1>
    <p class="subtitle">Register your APalPay wallet.</p>

    <form id="register-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Jane Doe">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="jane@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters">
        </div>

        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>

        <button type="submit" id="submit-btn">Create Account</button>
    </form>

    <div class="link-row">
        Already have an account? <a href="/wallet/login">Sign in</a>
    </div>
</div>

<script>
    const EGS_TOKEN_KEY = 'egs_access_token';
    const AUTH_SERVICE_BASE = `${window.location.protocol}//payment-auth.flashsale`;
    const searchParams = new URLSearchParams(window.location.search);
    const forceAuth = searchParams.get('force_auth') === '1';

    function withCurrentQuery(path) {
        const query = window.location.search;
        return query ? `${path}${query}` : path;
    }

    function sanitizeReturnUrl(rawUrl) {
        try {
            const url = new URL(rawUrl, window.location.origin);
            url.searchParams.delete('force_auth');
            return url.toString();
        } catch (_err) {
            return rawUrl;
        }
    }

    document.querySelector('.link-row a').href = withCurrentQuery('/wallet/login');

    if (forceAuth) {
        localStorage.removeItem(EGS_TOKEN_KEY);
    }

    // If already logged in, redirect
    if (!forceAuth && localStorage.getItem(EGS_TOKEN_KEY)) {
        const queryReturnUrl = searchParams.get('returnUrl');
        if (queryReturnUrl) {
            window.location.href = queryReturnUrl;
        } else {
            window.location.href = '/wallet/dashboard';
        }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        btn.textContent = 'Creating account...';
        btn.disabled = true;

        try {
            const registerResp = await fetch(`${AUTH_SERVICE_BASE}/api/v1/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: name, email, password })
            });

            const registerData = await registerResp.json();

            if (!registerResp.ok) {
                // If it fails with "Email already registered" because they are
                // creating an account on the new Auth service DB, show error
                throw new Error(registerData.detail || 'Registration failed');
            }

            successEl.textContent = 'Account created! Redirecting to sign in...';
            successEl.style.display = 'block';

            setTimeout(() => {
                window.location.href = withCurrentQuery('/wallet/login');
            }, 1000);

        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
