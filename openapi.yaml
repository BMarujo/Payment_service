components:
  schemas:
    ApiKeyCreate:
      description: Request body to create a new API key.
      examples:
      - client_name: Ticket Service
        description: API key for the event ticketing microservice
        rate_limit_requests: 200
        rate_limit_window_seconds: 60
        scopes:
        - payments:read
        - payments:write
        - customers:read
      properties:
        client_name:
          description: Name of the client/tenant
          maxLength: 255
          minLength: 1
          title: Client Name
          type: string
        description:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          description: Description of what this key is used for
          title: Description
        expires_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Expiration timestamp (UTC). Null means the key never expires.
          title: Expires At
        rate_limit_requests:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          description: Custom rate limit (requests per window). Uses global default
            if not set.
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - maximum: 3600.0
            minimum: 1.0
            type: integer
          - type: 'null'
          description: Custom rate limit window in seconds. Uses global default if
            not set.
          title: Rate Limit Window Seconds
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 'List of allowed scopes. If empty/null, all scopes are allowed.
            Available scopes: payments:read, payments:write, refunds:read, refunds:write,
            customers:read, customers:write'
          title: Scopes
      required:
      - client_name
      title: ApiKeyCreate
      type: object
    ApiKeyCreatedResponse:
      description: "Response returned only at creation time.\nContains the raw API\
        \ key \u2014 this is the ONLY time the full key is shown."
      properties:
        client_name:
          title: Client Name
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        expires_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Expires At
        id:
          format: uuid
          title: Id
          type: string
        is_active:
          title: Is Active
          type: boolean
        key_prefix:
          description: First characters of the key for identification
          title: Key Prefix
          type: string
        last_used_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Used At
        rate_limit_requests:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Window Seconds
        raw_key:
          description: "The full API key. Store this securely \u2014 it cannot be\
            \ retrieved again."
          title: Raw Key
          type: string
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - key_prefix
      - client_name
      - is_active
      - created_at
      - updated_at
      - raw_key
      title: ApiKeyCreatedResponse
      type: object
    ApiKeyListResponse:
      description: Paginated list of API keys.
      properties:
        has_more:
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/ApiKeyResponse'
          title: Items
          type: array
        limit:
          title: Limit
          type: integer
        offset:
          title: Offset
          type: integer
        total:
          title: Total
          type: integer
      required:
      - items
      - total
      - limit
      - offset
      - has_more
      title: ApiKeyListResponse
      type: object
    ApiKeyResponse:
      description: API key details (without the raw key).
      properties:
        client_name:
          title: Client Name
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        expires_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Expires At
        id:
          format: uuid
          title: Id
          type: string
        is_active:
          title: Is Active
          type: boolean
        key_prefix:
          description: First characters of the key for identification
          title: Key Prefix
          type: string
        last_used_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Used At
        rate_limit_requests:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Window Seconds
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - key_prefix
      - client_name
      - is_active
      - created_at
      - updated_at
      title: ApiKeyResponse
      type: object
    ApiKeyUpdate:
      description: Request body to update an API key.
      properties:
        description:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          title: Description
        expires_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Expires At
        is_active:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Set to false to revoke the key
          title: Is Active
        rate_limit_requests:
          anyOf:
          - maximum: 10000.0
            minimum: 1.0
            type: integer
          - type: 'null'
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - maximum: 3600.0
            minimum: 1.0
            type: integer
          - type: 'null'
          title: Rate Limit Window Seconds
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
      title: ApiKeyUpdate
      type: object
    CheckoutLineItem:
      description: A single line item in the checkout.
      properties:
        name:
          description: Product/item name shown on the checkout page
          maxLength: 200
          title: Name
          type: string
        price:
          description: Unit price in smallest currency unit (e.g., cents)
          exclusiveMinimum: 0.0
          title: Price
          type: integer
        quantity:
          default: 1
          description: Number of units
          minimum: 1.0
          title: Quantity
          type: integer
      required:
      - name
      - price
      title: CheckoutLineItem
      type: object
    CheckoutSessionCreate:
      description: "Request body to create a hosted checkout session.\n\nThe client\
        \ only needs to send the payment details and redirect URLs.\nThe response\
        \ includes a checkout_url \u2014 redirect the end-user there."
      examples:
      - cancel_url: https://mytickets.com/order/123/cancel
        currency: usd
        customer_email: alice@example.com
        customer_name: Alice Smith
        line_items:
        - name: VIP Concert Ticket
          price: 5000
          quantity: 2
        metadata:
          event_id: evt_456
          order_id: order_123
        success_url: https://mytickets.com/order/123/success
      properties:
        cancel_url:
          description: URL to redirect the customer if they cancel the checkout.
          title: Cancel Url
          type: string
        currency:
          default: usd
          description: ISO 4217 currency code
          maxLength: 3
          minLength: 3
          title: Currency
          type: string
        customer_email:
          description: Email of the customer. If they don't exist in the Payment Service,
            a new identity will be created automatically.
          title: Customer Email
          type: string
        customer_name:
          anyOf:
          - type: string
          - type: 'null'
          description: Name of the customer (used if creating a new identity)
          title: Customer Name
        line_items:
          description: Items being purchased (displayed on the checkout page)
          items:
            $ref: '#/components/schemas/CheckoutLineItem'
          minItems: 1
          title: Line Items
          type: array
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          description: Arbitrary key-value metadata passed to the payment
          title: Metadata
        success_url:
          description: URL to redirect the customer after successful payment. Stripe
            appends `?session_id={CHECKOUT_SESSION_ID}` automatically.
          title: Success Url
          type: string
      required:
      - line_items
      - success_url
      - cancel_url
      - customer_email
      title: CheckoutSessionCreate
      type: object
    CheckoutSessionResponse:
      description: 'Response after creating a checkout session.


        Redirect the end-user''s browser to `checkout_url` to complete payment.'
      properties:
        amount_total:
          description: Total amount in smallest currency unit
          title: Amount Total
          type: integer
        cancel_url:
          description: URL to redirect on cancel
          title: Cancel Url
          type: string
        checkout_url:
          description: URL to redirect the customer to for payment
          title: Checkout Url
          type: string
        currency:
          description: ISO 4217 currency code
          title: Currency
          type: string
        customer_email:
          description: Pre-fill email
          title: Customer Email
          type: string
        customer_name:
          description: Pre-fill name on card
          title: Customer Name
          type: string
        expires_at:
          description: When this checkout session expires
          format: date-time
          title: Expires At
          type: string
        line_items:
          anyOf:
          - items:
              $ref: '#/components/schemas/CheckoutLineItem'
            type: array
          - type: 'null'
          description: Items to display in the UI
          title: Line Items
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          description: Metadata
          title: Metadata
        payment_status:
          description: 'Payment status: unpaid, paid, or no_payment_required'
          title: Payment Status
          type: string
        publishable_key:
          description: Stripe Publishable Key for frontend initialization
          title: Publishable Key
          type: string
        session_id:
          description: Local Checkout Session ID
          title: Session Id
          type: string
        status:
          description: 'Session status: open, complete, or expired'
          title: Status
          type: string
        success_url:
          description: URL to redirect on success
          title: Success Url
          type: string
      required:
      - session_id
      - publishable_key
      - checkout_url
      - status
      - success_url
      - cancel_url
      - expires_at
      - payment_status
      - amount_total
      - currency
      - customer_name
      - customer_email
      title: CheckoutSessionResponse
      type: object
    CustomerCreate:
      description: Request body to create a customer.
      examples:
      - email: john.doe@example.com
        metadata:
          external_id: user_123
        name: John Doe
        phone: '+1234567890'
      properties:
        email:
          description: Customer email address
          format: email
          title: Email
          type: string
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          description: Arbitrary key-value metadata
          title: Metadata
        name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          description: Customer full name
          title: Name
        phone:
          anyOf:
          - maxLength: 50
            type: string
          - type: 'null'
          description: Customer phone number
          title: Phone
      required:
      - email
      title: CustomerCreate
      type: object
    CustomerListResponse:
      description: Paginated list of customers.
      properties:
        has_more:
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/CustomerResponse'
          title: Items
          type: array
        limit:
          title: Limit
          type: integer
        offset:
          title: Offset
          type: integer
        total:
          title: Total
          type: integer
      required:
      - items
      - total
      - limit
      - offset
      - has_more
      title: CustomerListResponse
      type: object
    CustomerResponse:
      description: Customer response body.
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        email:
          title: Email
          type: string
        id:
          format: uuid
          title: Id
          type: string
        is_active:
          default: true
          title: Is Active
          type: boolean
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          title: Metadata
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        phone:
          anyOf:
          - type: string
          - type: 'null'
          title: Phone
        stripe_customer_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Stripe Customer Id
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - email
      - created_at
      - updated_at
      title: CustomerResponse
      type: object
    CustomerUpdate:
      description: Request body to update a customer.
      properties:
        email:
          anyOf:
          - format: email
            type: string
          - type: 'null'
          description: Customer email address
          title: Email
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          description: Arbitrary key-value metadata
          title: Metadata
        name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          description: Customer full name
          title: Name
        phone:
          anyOf:
          - maxLength: 50
            type: string
          - type: 'null'
          description: Customer phone number
          title: Phone
      title: CustomerUpdate
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    PaymentCreate:
      description: Request body to create a new payment.
      examples:
      - amount: 5000
        confirm: true
        currency: usd
        description: Event ticket purchase
        metadata:
          event_id: evt_123
          ticket_type: VIP
        payment_method_id: pm_card_visa
      properties:
        amount:
          description: Amount in smallest currency unit (e.g., cents)
          exclusiveMinimum: 0.0
          title: Amount
          type: integer
        confirm:
          default: true
          description: Whether to immediately confirm the payment
          title: Confirm
          type: boolean
        currency:
          default: usd
          description: ISO 4217 currency code
          maxLength: 3
          minLength: 3
          title: Currency
          type: string
        customer_id:
          description: ID of the customer in our system
          format: uuid
          title: Customer Id
          type: string
        description:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          description: Payment description
          title: Description
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          description: Arbitrary key-value metadata
          title: Metadata
        payment_method_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Stripe payment method ID (e.g., pm_card_visa)
          title: Payment Method Id
      required:
      - amount
      - customer_id
      title: PaymentCreate
      type: object
    PaymentListResponse:
      description: Paginated list of payments.
      properties:
        has_more:
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/PaymentResponse'
          title: Items
          type: array
        limit:
          title: Limit
          type: integer
        offset:
          title: Offset
          type: integer
        total:
          title: Total
          type: integer
      required:
      - items
      - total
      - limit
      - offset
      - has_more
      title: PaymentListResponse
      type: object
    PaymentResponse:
      description: Payment response body.
      properties:
        amount:
          title: Amount
          type: integer
        amount_refunded:
          default: 0
          title: Amount Refunded
          type: integer
        client_secret:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Secret
        created_at:
          format: date-time
          title: Created At
          type: string
        currency:
          title: Currency
          type: string
        customer_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Customer Id
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        id:
          format: uuid
          title: Id
          type: string
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          title: Metadata
        payment_method_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Payment Method Id
        status:
          title: Status
          type: string
        stripe_payment_intent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Stripe Payment Intent Id
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - amount
      - currency
      - status
      - created_at
      - updated_at
      title: PaymentResponse
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: Enter your API key. Use the **admin key** (from ADMIN_API_KEY env
        var) for `/api/v1/admin/*` endpoints, or a **tenant key** (ps_live_...) for
        payment/refund/customer operations.
      in: header
      name: X-API-Key
      type: apiKey
info:
  description: "Production-ready payment microservice with Stripe integration. Provides\
    \ a complete payment processing API including payments, refunds, customer management,\
    \ receipt generation, and webhook handling.\n\n## Authentication\nAll API endpoints\
    \ (except health checks and webhooks) require an `X-API-Key` header for authentication.\
    \ Click the **Authorize** button (\U0001F512) above to enter your API key, and\
    \ it will be included in all requests.\n\n- **Admin key**: Set via `ADMIN_API_KEY`\
    \ env var \u2014 used to manage tenant API keys\n- **Tenant keys**: Created via\
    \ `POST /api/v1/admin/api-keys` \u2014 used for payment operations\n\n## Idempotency\n\
    POST endpoints support the `Idempotency-Key` header to prevent duplicate operations.\n\
    \n## Rate Limiting\nAPI requests are rate-limited per API key. Each tenant key\
    \ can have custom rate limits. Check the `X-RateLimit-*` response headers for\
    \ current limits."
  title: Payment Service
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/admin/api-keys:
    get:
      description: Retrieve a paginated list of all API keys. **Requires admin API
        key.**
      operationId: list_api_keys_api_v1_admin_api_keys_get
      parameters:
      - description: Items per page
        in: query
        name: limit
        required: false
        schema:
          default: 20
          description: Items per page
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - description: Items to skip
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Items to skip
          minimum: 0
          title: Offset
          type: integer
      - description: Filter by active status
        in: query
        name: is_active
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by active status
          title: Is Active
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List API keys
      tags:
      - API Keys
    post:
      description: "Generate a new API key for a client/tenant. The raw key is returned\
        \ **only in this response** \u2014 store it securely. It cannot be retrieved\
        \ again.\n\n**Requires admin API key.**"
      operationId: create_api_key_api_v1_admin_api_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreatedResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create a new API key
      tags:
      - API Keys
  /api/v1/admin/api-keys/{key_id}:
    delete:
      description: Permanently revoke an API key. The key will immediately stop working.
        **Requires admin API key.**
      operationId: revoke_api_key_api_v1_admin_api_keys__key_id__delete
      parameters:
      - in: path
        name: key_id
        required: true
        schema:
          format: uuid
          title: Key Id
          type: string
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Revoke an API key
      tags:
      - API Keys
    get:
      description: Retrieve details of a specific API key. **Requires admin API key.**
      operationId: get_api_key_api_v1_admin_api_keys__key_id__get
      parameters:
      - in: path
        name: key_id
        required: true
        schema:
          format: uuid
          title: Key Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get API key details
      tags:
      - API Keys
    put:
      description: Update API key properties such as scopes, rate limits, or active
        status. **Requires admin API key.**
      operationId: update_api_key_api_v1_admin_api_keys__key_id__put
      parameters:
      - in: path
        name: key_id
        required: true
        schema:
          format: uuid
          title: Key Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update an API key
      tags:
      - API Keys
  /api/v1/checkout/sessions:
    post:
      description: "Create a hosted checkout session. Returns a `checkout_url` \u2014\
        \ redirect the end-user's browser to that URL to collect payment.\n\n**This\
        \ is the main integration point for client services.** The client only needs\
        \ to call this endpoint, redirect the user, and wait for the success redirect."
      operationId: create_checkout_session_api_v1_checkout_sessions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSessionCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create a custom checkout session
      tags:
      - Checkout
  /api/v1/checkout/sessions/{session_id}:
    get:
      description: 'Check the status of a checkout session. Use this to verify payment
        completion after the user is redirected back.


        **Statuses**: `open` (waiting for payment), `complete` (paid), `expired` (timed
        out, ~24h).'
      operationId: get_checkout_session_api_v1_checkout_sessions__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
