openapi: 3.1.0
info:
  title: Payment Service
  description: 'Production-ready Digital Wallet payment API. Provides a complete payment processing API including checkouts,
    refunds, customer management, and receipt generation.


    ## Authentication

    All API endpoints (except health checks and auth) require an `X-API-Key` header for authentication. Click the **Authorize**
    button (🔒) above to enter your API key, and it will be included in all requests.


    - **Admin key**: Set via `ADMIN_API_KEY` env var — used to manage tenant API keys

    - **Tenant keys**: Created via `POST /api/v1/admin/api-keys` — used for payment operations


    ## Idempotency

    POST endpoints support the `Idempotency-Key` header to prevent duplicate operations.


    ## Rate Limiting

    API requests are rate-limited per API key. Each tenant key can have custom rate limits. Check the `X-RateLimit-*` response
    headers for current limits.'
  version: 1.0.0
servers:
- url: http://localhost:8000
  description: Local development server
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      description: Returns service health status. Used by container orchestrators.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Health Check Health Get
  /ready:
    get:
      tags:
      - Health
      summary: Readiness probe
      description: Checks connectivity to PostgreSQL and Redis.
      operationId: readiness_check_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/checkout/sessions:
    post:
      tags:
      - Checkout
      summary: Create a custom checkout session
      description: 'Create a hosted checkout session. Returns a `checkout_url` — redirect the end-user''s browser to that
        URL to collect their custom Digital Wallet authorization.


        **This is the main integration point for client services.** The client only needs to call this endpoint, redirect
        the user to the local UI, and wait for the success callback redirect.'
      operationId: create_checkout_session_api_v1_checkout_sessions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSessionCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/checkout/sessions/{session_id}/authorize:
    post:
      tags:
      - Checkout
      summary: Authorize a checkout session via Password
      operationId: authorize_checkout_session_api_v1_checkout_sessions__session_id__authorize_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutAuthorizeRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutAuthorizeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/checkout/sessions/{session_id}:
    get:
      tags:
      - Checkout
      summary: Get checkout session status
      description: 'Check the status of a checkout session. Use this to verify payment completion after the user is redirected
        back.


        **Statuses**: `open` (waiting for payment), `complete` (paid), `expired` (timed out, ~24h).'
      operationId: get_checkout_session_api_v1_checkout_sessions__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments:
    post:
      tags:
      - Payments
      summary: Create a payment
      description: Create a new payment via the Digital Wallet system. Supports idempotency via the `Idempotency-Key` header.
      operationId: create_payment_api_v1_payments_post
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Payments
      summary: List payments
      description: Retrieve a paginated list of payments with optional filters.
      operationId: list_payments_api_v1_payments_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by status
          title: Status
        description: Filter by status
      - name: customer_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          description: Filter by customer ID
          title: Customer Id
        description: Filter by customer ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments/{payment_id}:
    get:
      tags:
      - Payments
      summary: Get payment details
      description: Retrieve details of a specific payment by its ID.
      operationId: get_payment_api_v1_payments__payment_id__get
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Payments
      summary: Cancel or refund a payment
      description: 'Cancel or refund a payment depending on its current status:


        - **Pending / processing / requires_action** → cancels the payment

        - **Succeeded / partially_refunded** → automatically issues a full refund


        The payment status is updated accordingly (`canceled` or `refunded`).'
      operationId: cancel_or_refund_payment_api_v1_payments__payment_id__delete
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments/{payment_id}/confirm:
    put:
      tags:
      - Payments
      summary: Confirm a payment
      description: Confirm/capture a pending payment intent. Updates the existing payment status to 'succeeded' (or 'requires_action'
        if further steps are needed).
      operationId: confirm_payment_api_v1_payments__payment_id__confirm_put
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments/{payment_id}/receipt:
    get:
      tags:
      - Payments
      summary: Download payment receipt
      description: Generate and download a PDF receipt for a succeeded payment.
      operationId: download_receipt_api_v1_payments__payment_id__receipt_get
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: PDF receipt file
          content:
            application/json:
              schema: {}
            application/pdf: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/customers:
    post:
      tags:
      - Customers
      summary: Create a customer
      description: Create a new customer in the system.
      operationId: create_customer_api_v1_customers_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Customers
      summary: List customers
      description: Retrieve a paginated list of customers.
      operationId: list_customers_api_v1_customers_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: email
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by email (partial match)
          title: Email
        description: Filter by email (partial match)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/customers/me/transactions:
    get:
      tags:
      - Customers
      summary: Get my transactions
      description: Retrieve the payment history for the currently authenticated customer.
      operationId: get_my_transactions_api_v1_customers_me_transactions_get
      security:
      - HTTPBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/customers/{customer_id}:
    get:
      tags:
      - Customers
      summary: Get customer details
      description: Retrieve details of a specific customer by ID.
      operationId: get_customer_api_v1_customers__customer_id__get
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Customer Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Customers
      summary: Update a customer
      description: Update customer details. Only provided fields will be changed.
      operationId: update_customer_api_v1_customers__customer_id__put
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Customer Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Customers
      summary: Delete a customer
      description: Soft-delete a customer.
      operationId: delete_customer_api_v1_customers__customer_id__delete
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Customer Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/refunds:
    post:
      tags:
      - Refunds
      summary: Create a refund
      description: Create a refund for a succeeded payment. Supports partial refunds by specifying an amount less than the
        original payment. Supports idempotency via the `Idempotency-Key` header.
      operationId: create_refund_api_v1_refunds_post
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Refunds
      summary: List refunds
      description: Retrieve a paginated list of refunds with optional filters.
      operationId: list_refunds_api_v1_refunds_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: payment_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          description: Filter by payment ID
          title: Payment Id
        description: Filter by payment ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/refunds/{refund_id}:
    get:
      tags:
      - Refunds
      summary: Get refund details
      description: Retrieve details of a specific refund by its ID.
      operationId: get_refund_api_v1_refunds__refund_id__get
      parameters:
      - name: refund_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Refund Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/api-keys:
    post:
      tags:
      - API Keys
      summary: Create a new API key
      description: 'Generate a new API key for a client/tenant. The raw key is returned **only in this response** — store
        it securely. It cannot be retrieved again.


        **Requires admin API key.**'
      operationId: create_api_key_api_v1_admin_api_keys_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - API Keys
      summary: List API keys
      description: Retrieve a paginated list of all API keys. **Requires admin API key.**
      operationId: list_api_keys_api_v1_admin_api_keys_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Items to skip
          default: 0
          title: Offset
        description: Items to skip
      - name: is_active
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by active status
          title: Is Active
        description: Filter by active status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/api-keys/{key_id}:
    get:
      tags:
      - API Keys
      summary: Get API key details
      description: Retrieve details of a specific API key. **Requires admin API key.**
      operationId: get_api_key_api_v1_admin_api_keys__key_id__get
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - API Keys
      summary: Update an API key
      description: Update API key properties such as scopes, rate limits, or active status. **Requires admin API key.**
      operationId: update_api_key_api_v1_admin_api_keys__key_id__put
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - API Keys
      summary: Revoke an API key
      description: Permanently revoke an API key. The key will immediately stop working. **Requires admin API key.**
      operationId: revoke_api_key_api_v1_admin_api_keys__key_id__delete
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register Customer
      operationId: register_customer_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegister'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login Customer
      operationId: login_customer_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerLogin'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /app/register:
    get:
      tags:
      - Digital Wallet
      summary: Get wallet registration page URL
      description: Returns the URL for the Digital Wallet registration page. Redirect the user's browser there to create a
        wallet account.
      operationId: get_register_url_app_register_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /app/dashboard:
    get:
      tags:
      - Digital Wallet
      summary: Get wallet dashboard page URL
      description: Returns the URL for the Digital Wallet dashboard page. Redirect the user's browser there to manage their
        wallet.
      operationId: get_dashboard_url_app_dashboard_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /app/login:
    get:
      tags:
      - Digital Wallet
      summary: Get wallet login page URL
      description: Returns the URL for the Digital Wallet login page. Redirect existing users there to sign in.
      operationId: get_login_url_app_login_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    ApiKeyCreate:
      properties:
        client_name:
          type: string
          maxLength: 255
          minLength: 1
          title: Client Name
          description: Name of the client/tenant
        description:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Description
          description: Description of what this key is used for
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
          description: 'List of allowed scopes. If empty/null, all scopes are allowed. Available scopes: payments:read, payments:write,
            refunds:read, refunds:write, customers:read, customers:write'
        rate_limit_requests:
          anyOf:
          - type: integer
            maximum: 10000.0
            minimum: 1.0
          - type: 'null'
          title: Rate Limit Requests
          description: Custom rate limit (requests per window). Uses global default if not set.
        rate_limit_window_seconds:
          anyOf:
          - type: integer
            maximum: 3600.0
            minimum: 1.0
          - type: 'null'
          title: Rate Limit Window Seconds
          description: Custom rate limit window in seconds. Uses global default if not set.
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
