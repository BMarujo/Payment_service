openapi: 3.1.0
info:
  title: Payment Service
  description: 'Production-ready payment microservice with Stripe integration. Provides
    a complete payment processing API including payments, refunds, customer management,
    receipt generation, and webhook handling.


    ## Authentication

    All API endpoints (except health checks and webhooks) require an `X-API-Key` header
    for authentication. Click the **Authorize** button (🔒) above to enter your API
    key, and it will be included in all requests.


    - **Admin key**: Set via `ADMIN_API_KEY` env var — used to manage tenant API keys

    - **Tenant keys**: Created via `POST /api/v1/admin/api-keys` — used for payment
    operations


    ## Idempotency

    POST endpoints support the `Idempotency-Key` header to prevent duplicate operations.


    ## Rate Limiting

    API requests are rate-limited per API key. Each tenant key can have custom rate
    limits. Check the `X-RateLimit-*` response headers for current limits.'
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      description: Returns service health status. Used by container orchestrators.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Health Check Health Get
  /ready:
    get:
      tags:
      - Health
      summary: Readiness probe
      description: Checks connectivity to PostgreSQL and Redis.
      operationId: readiness_check_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/payments:
    post:
      tags:
      - Payments
      summary: Create a payment
      description: Create a new payment intent via Stripe. Use Stripe test payment
        methods like `pm_card_visa` for testing. Supports idempotency via the `Idempotency-Key`
        header.
      operationId: create_payment_api_v1_payments_post
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Payments
      summary: List payments
      description: Retrieve a paginated list of payments with optional filters.
      operationId: list_payments_api_v1_payments_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by status
          title: Status
        description: Filter by status
      - name: customer_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          description: Filter by customer ID
          title: Customer Id
        description: Filter by customer ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments/{payment_id}:
    get:
      tags:
      - Payments
      summary: Get payment details
      description: Retrieve details of a specific payment by its ID.
      operationId: get_payment_api_v1_payments__payment_id__get
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Payments
      summary: Cancel or refund a payment
      description: 'Cancel or refund a payment depending on its current status:


        - **Pending / processing / requires_action** → cancels the payment via Stripe

        - **Succeeded** → automatically issues a full refund via Stripe


        The payment status is updated accordingly (`canceled` or `refunded`).'
      operationId: cancel_or_refund_payment_api_v1_payments__payment_id__delete
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments/{payment_id}/confirm:
    put:
      tags:
      - Payments
      summary: Confirm a payment
      description: Confirm/capture a pending payment intent. Updates the existing
        payment status to 'succeeded' (or 'requires_action' if further steps are needed).
      operationId: confirm_payment_api_v1_payments__payment_id__confirm_put
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/payments/{payment_id}/receipt:
    get:
      tags:
      - Payments
      summary: Download payment receipt
      description: Generate and download a PDF receipt for a succeeded payment.
      operationId: download_receipt_api_v1_payments__payment_id__receipt_get
      parameters:
      - name: payment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Payment Id
      responses:
        '200':
          description: PDF receipt file
          content:
            application/json:
              schema: {}
            application/pdf: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/customers:
    post:
      tags:
      - Customers
      summary: Create a customer
      description: Create a new customer in the system and Stripe.
      operationId: create_customer_api_v1_customers_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Customers
      summary: List customers
      description: Retrieve a paginated list of customers.
      operationId: list_customers_api_v1_customers_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of items to skip
          default: 0
          title: Offset
        description: Number of items to skip
      - name: email
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by email (partial match)
          title: Email
        description: Filter by email (partial match)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/customers/{customer_id}:
    get:
      tags:
      - Customers
      summary: Get customer details
      description: Retrieve details of a specific customer by ID.
      operationId: get_customer_api_v1_customers__customer_id__get
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Customer Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Customers
      summary: Update a customer
      description: Update customer details. Only provided fields will be changed.
      operationId: update_customer_api_v1_customers__customer_id__put
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Customer Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Customers
      summary: Delete a customer
      description: Soft-delete a customer from the system and Stripe.
      operationId: delete_customer_api_v1_customers__customer_id__delete
      parameters:
      - name: customer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Customer Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/webhooks/stripe:
    post:
      tags:
      - Webhooks
      summary: Stripe webhook receiver
      description: Receives and processes webhook events from Stripe. Verifies the
        webhook signature before processing. This endpoint should be configured in
        the Stripe Dashboard.
      operationId: stripe_webhook_api_v1_webhooks_stripe_post
      parameters:
      - name: Stripe-Signature
        in: header
        required: true
        schema:
          type: string
          title: Stripe-Signature
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/api-keys:
    post:
      tags:
      - API Keys
      summary: Create a new API key
      description: 'Generate a new API key for a client/tenant. The raw key is returned
        **only in this response** — store it securely. It cannot be retrieved again.


        **Requires admin API key.**'
      operationId: create_api_key_api_v1_admin_api_keys_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - API Keys
      summary: List API keys
      description: Retrieve a paginated list of all API keys. **Requires admin API
        key.**
      operationId: list_api_keys_api_v1_admin_api_keys_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 20
          title: Limit
        description: Items per page
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Items to skip
          default: 0
          title: Offset
        description: Items to skip
      - name: is_active
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by active status
          title: Is Active
        description: Filter by active status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/api-keys/{key_id}:
    get:
      tags:
      - API Keys
      summary: Get API key details
      description: Retrieve details of a specific API key. **Requires admin API key.**
      operationId: get_api_key_api_v1_admin_api_keys__key_id__get
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - API Keys
      summary: Update an API key
      description: Update API key properties such as scopes, rate limits, or active
        status. **Requires admin API key.**
      operationId: update_api_key_api_v1_admin_api_keys__key_id__put
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - API Keys
      summary: Revoke an API key
      description: Permanently revoke an API key. The key will immediately stop working.
        **Requires admin API key.**
      operationId: revoke_api_key_api_v1_admin_api_keys__key_id__delete
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ApiKeyCreate:
      properties:
        client_name:
          type: string
          maxLength: 255
          minLength: 1
          title: Client Name
          description: Name of the client/tenant
        description:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Description
          description: Description of what this key is used for
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
          description: 'List of allowed scopes. If empty/null, all scopes are allowed.
            Available scopes: payments:read, payments:write, refunds:read, refunds:write,
            customers:read, customers:write'
        rate_limit_requests:
          anyOf:
          - type: integer
            maximum: 10000.0
            minimum: 1.0
          - type: 'null'
          title: Rate Limit Requests
          description: Custom rate limit (requests per window). Uses global default
            if not set.
        rate_limit_window_seconds:
          anyOf:
          - type: integer
            maximum: 3600.0
            minimum: 1.0
          - type: 'null'
          title: Rate Limit Window Seconds
          description: Custom rate limit window in seconds. Uses global default if
            not set.
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
          description: Expiration timestamp (UTC). Null means the key never expires.
      type: object
      required:
      - client_name
      title: ApiKeyCreate
      description: Request body to create a new API key.
      examples:
      - client_name: Ticket Service
        description: API key for the event ticketing microservice
        rate_limit_requests: 200
        rate_limit_window_seconds: 60
        scopes:
        - payments:read
        - payments:write
        - customers:read
    ApiKeyCreatedResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        key_prefix:
          type: string
          title: Key Prefix
          description: First characters of the key for identification
        client_name:
          type: string
          title: Client Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
        is_active:
          type: boolean
          title: Is Active
        rate_limit_requests:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Window Seconds
        last_used_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Used At
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        raw_key:
          type: string
          title: Raw Key
          description: The full API key. Store this securely — it cannot be retrieved
            again.
      type: object
      required:
      - id
      - key_prefix
      - client_name
      - is_active
      - created_at
      - updated_at
      - raw_key
      title: ApiKeyCreatedResponse
      description: 'Response returned only at creation time.

        Contains the raw API key — this is the ONLY time the full key is shown.'
    ApiKeyListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ApiKeyResponse'
          type: array
          title: Items
        total:
          type: integer
          title: Total
        limit:
          type: integer
          title: Limit
        offset:
          type: integer
          title: Offset
        has_more:
          type: boolean
          title: Has More
      type: object
      required:
      - items
      - total
      - limit
      - offset
      - has_more
      title: ApiKeyListResponse
      description: Paginated list of API keys.
    ApiKeyResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        key_prefix:
          type: string
          title: Key Prefix
          description: First characters of the key for identification
        client_name:
          type: string
          title: Client Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
        is_active:
          type: boolean
          title: Is Active
        rate_limit_requests:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rate Limit Window Seconds
        last_used_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Used At
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - key_prefix
      - client_name
      - is_active
      - created_at
      - updated_at
      title: ApiKeyResponse
      description: API key details (without the raw key).
    ApiKeyUpdate:
      properties:
        description:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Description
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
        is_active:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Active
          description: Set to false to revoke the key
        rate_limit_requests:
          anyOf:
          - type: integer
            maximum: 10000.0
            minimum: 1.0
          - type: 'null'
          title: Rate Limit Requests
        rate_limit_window_seconds:
          anyOf:
          - type: integer
            maximum: 3600.0
            minimum: 1.0
          - type: 'null'
          title: Rate Limit Window Seconds
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
      type: object
      title: ApiKeyUpdate
      description: Request body to update an API key.
    CustomerCreate:
      properties:
        email:
          type: string
          format: email
          title: Email
          description: Customer email address
        name:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Name
          description: Customer full name
        phone:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: Phone
          description: Customer phone number
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          title: Metadata
          description: Arbitrary key-value metadata
      type: object
      required:
      - email
      title: CustomerCreate
      description: Request body to create a customer.
      examples:
      - email: john.doe@example.com
        metadata:
          external_id: user_123
        name: John Doe
        phone: '+1234567890'
    CustomerListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/CustomerResponse'
          type: array
          title: Items
        total:
          type: integer
          title: Total
        limit:
          type: integer
          title: Limit
        offset:
          type: integer
          title: Offset
        has_more:
          type: boolean
          title: Has More
      type: object
      required:
      - items
      - total
      - limit
      - offset
      - has_more
      title: CustomerListResponse
      description: Paginated list of customers.
    CustomerResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        stripe_customer_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Stripe Customer Id
        email:
          type: string
          title: Email
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        phone:
          anyOf:
          - type: string
          - type: 'null'
          title: Phone
        metadata:
          anyOf:
          - type: object
          - type: 'null'
          title: Metadata
        is_active:
          type: boolean
          title: Is Active
          default: true
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - email
      - created_at
      - updated_at
      title: CustomerResponse
      description: Customer response body.
    CustomerUpdate:
      properties:
        email:
          anyOf:
          - type: string
            format: email
          - type: 'null'
          title: Email
          description: Customer email address
        name:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Name
          description: Customer full name
        phone:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
